naftiko: "1.0.0-alpha1"

info:
  label: "BFE Load Balancer Management"
  description: >-
    Workflow capability for managing BFE load balancer operations including
    runtime metrics collection, configuration hot reload, and observability
    for infrastructure and platform engineering teams.
  tags:
    - BFE
    - Load Balancer
    - Management
    - Monitoring
    - Configuration
  created: "2026-04-21"
  modified: "2026-04-21"

binds:
  - namespace: env
    keys:
      BFE_HOST: BFE_HOST
      BFE_PORT: BFE_PORT

capability:
  consumes:
    - import: bfe-management
      location: ./shared/management-api.yaml

  exposes:
    - type: rest
      port: 8080
      namespace: bfe-management-api
      description: "REST API for BFE load balancer management and observability."
      resources:
        - path: /v1/metrics
          name: metrics
          description: "Retrieve BFE runtime monitoring metrics"
          operations:
            - method: GET
              name: get-metrics
              description: "Get BFE runtime metrics and performance counters"
              call: "bfe-management.get-monitor-metrics"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/categories
          name: categories
          description: "Retrieve available metric categories"
          operations:
            - method: GET
              name: get-categories
              description: "Get available monitoring metric categories"
              call: "bfe-management.get-monitor-categories"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/reload
          name: reload
          description: "Hot reload BFE configuration"
          operations:
            - method: POST
              name: reload-config
              description: "Trigger hot reload of BFE routing rules and configuration"
              call: "bfe-management.reload-config"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9090
      namespace: bfe-management-mcp
      transport: http
      description: "MCP server for AI-assisted BFE load balancer management and observability."
      tools:
        - name: get-bfe-metrics
          description: "Retrieve BFE load balancer runtime metrics and performance counters for monitoring"
          hints:
            readOnly: true
            openWorld: false
          call: "bfe-management.get-monitor-metrics"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-metric-categories
          description: "List available BFE metric categories for targeted monitoring"
          hints:
            readOnly: true
            openWorld: false
          call: "bfe-management.get-monitor-categories"
          outputParameters:
            - type: object
              mapping: "$."
        - name: reload-bfe-config
          description: "Trigger a hot reload of BFE routing and load balancing configuration without restart"
          hints:
            readOnly: false
            openWorld: false
          call: "bfe-management.reload-config"
          outputParameters:
            - type: object
              mapping: "$."
